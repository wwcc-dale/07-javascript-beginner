<!DOCTYPE html>
<!-- Session 14: Interactive Applications — Example Solution -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session 14 Solution</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    section { margin-bottom: 28px; border-top: 1px solid #ddd; padding-top: 12px; }
    button { margin: 4px; padding: 6px 12px; cursor: pointer; }
    .color-box { width: 100px; height: 60px; border: 1px solid #999; margin-top: 8px; }
    #count { font-size: 2rem; margin: 8px 0; }
    .todo-item.done { text-decoration: line-through; color: #aaa; }
    .todo-item { display: flex; align-items: center; gap: 8px; }
    .error { color: red; font-size: 0.9em; }
  </style>
</head>
<body>

  <!-- Challenge 1: Counter App -->
  <section>
    <h2>Counter</h2>
    <div id="count">0</div>
    <button onclick="adjust(1)">+1</button>
    <button onclick="adjust(-1)">-1</button>
    <button onclick="adjust(5)">+5</button>
    <button onclick="adjust(-5)">-5</button>
    <button onclick="resetCounter()">Reset</button>
  </section>

  <!-- Challenge 2: Form Handler -->
  <section>
    <h2>Form Handler</h2>
    <form id="userForm">
      <input id="nameInput" type="text" placeholder="Your name">
      <input id="emailInput" type="email" placeholder="Your email">
      <button type="submit">Submit</button>
    </form>
    <p class="error" id="formError"></p>
    <p id="welcomeMsg"></p>
  </section>

  <!-- Challenge 3: Interactive List -->
  <section>
    <h2>Interactive List</h2>
    <input id="listInput" type="text" placeholder="Add item">
    <button id="addListBtn">Add</button>
    <ul id="itemList"></ul>
  </section>

  <!-- Challenge 4: Color Picker -->
  <section>
    <h2>Color Picker</h2>
    <button onclick="pickColor('red')">Red</button>
    <button onclick="pickColor('blue')">Blue</button>
    <button onclick="pickColor('green')">Green</button>
    <button onclick="pickColor('yellow')">Yellow</button>
    <button onclick="pickColor('purple')">Purple</button>
    <button onclick="pickColor('orange')">Orange</button>
    <div class="color-box" id="colorBox"></div>
    <p id="colorLabel">No color selected</p>
  </section>

  <!-- Level 3: Complete Todo App -->
  <section>
    <h2>Todo App</h2>
    <input id="todoText" type="text" placeholder="New todo">
    <button onclick="addTodo()">Add</button>
    <div>
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('active')">Active</button>
      <button onclick="setFilter('completed')">Completed</button>
      <button onclick="clearCompleted()">Clear Completed</button>
    </div>
    <ul id="todoApp"></ul>
  </section>

  <script>
    // Challenge 1: Counter
    let count = 0;
    function adjust(n) {
      count += n;
      document.getElementById("count").textContent = count;
    }
    function resetCounter() { count = 0; document.getElementById("count").textContent = 0; }

    // Challenge 2: Form Handler
    document.getElementById("userForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("nameInput").value.trim();
      const email = document.getElementById("emailInput").value.trim();
      const err = document.getElementById("formError");
      if (!name || !email) {
        err.textContent = "Both fields are required.";
        return;
      }
      err.textContent = "";
      document.getElementById("welcomeMsg").textContent = `Welcome, ${name}! (${email})`;
      document.getElementById("userForm").reset();
    });

    // Challenge 3: Interactive List
    document.getElementById("addListBtn").addEventListener("click", () => {
      const input = document.getElementById("listInput");
      const text = input.value.trim();
      if (!text) return;
      const li = document.createElement("li");
      li.textContent = text + " ";
      const del = document.createElement("button");
      del.textContent = "Delete";
      del.addEventListener("click", () => li.remove());
      li.appendChild(del);
      document.getElementById("itemList").appendChild(li);
      input.value = "";
    });

    // Challenge 4: Color Picker
    function pickColor(color) {
      document.getElementById("colorBox").style.background = color;
      document.getElementById("colorLabel").textContent = `Current color: ${color}`;
    }

    // Level 3: Todo App
    let todos = [];
    let currentFilter = "all";

    function addTodo() {
      const text = document.getElementById("todoText").value.trim();
      if (!text) return;
      todos.push({ text, done: false, id: Date.now() });
      document.getElementById("todoText").value = "";
      renderTodos();
    }
    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      renderTodos();
    }
    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      renderTodos();
    }
    function setFilter(f) { currentFilter = f; renderTodos(); }
    function clearCompleted() { todos = todos.filter(t => !t.done); renderTodos(); }
    function renderTodos() {
      const list = document.getElementById("todoApp");
      list.innerHTML = "";
      const visible = todos.filter(t => {
        if (currentFilter === "active") return !t.done;
        if (currentFilter === "completed") return t.done;
        return true;
      });
      visible.forEach(t => {
        const li = document.createElement("li");
        li.className = "todo-item" + (t.done ? " done" : "");
        const cb = document.createElement("input");
        cb.type = "checkbox"; cb.checked = t.done;
        cb.addEventListener("change", () => toggleTodo(t.id));
        const span = document.createElement("span");
        span.textContent = t.text;
        const del = document.createElement("button");
        del.textContent = "Delete";
        del.addEventListener("click", () => deleteTodo(t.id));
        li.append(cb, span, del);
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
