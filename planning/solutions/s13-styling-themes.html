<!DOCTYPE html>
<!-- Session 13: Dynamic Styling and Themes — Example Solution -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session 13 Solution</title>
  <style>
    body { font-family: sans-serif; padding: 20px; transition: background 0.3s, color 0.3s; }
    body.dark-mode { background: #1a1a2e; color: #eee; }

    .box { width: 80px; height: 80px; background: #aaa; display: inline-block;
           margin: 4px; border-radius: 4px; transition: all 0.3s; }
    .box.highlighted { background: gold; border: 2px solid orange; }
    .box.hidden { display: none; }

    .card-panel { display: inline-block; border: 1px solid #ccc; padding: 10px;
                  margin: 8px; width: 120px; overflow: hidden;
                  height: 60px; transition: height 0.3s; }
    .card-panel.expanded { height: 160px; }

    .status-box { padding: 10px; margin-top: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .warning { background: #fff3cd; color: #856404; }
    .error   { background: #f8d7da; color: #721c24; }
    .info    { background: #d1ecf1; color: #0c5460; }

    button { margin: 4px; padding: 4px 8px; cursor: pointer; }
    section { margin-bottom: 24px; border-top: 1px solid #ddd; padding-top: 12px; }
  </style>
</head>
<body>

  <!-- Challenge 1: Class Toggle System -->
  <section>
    <h2>Class Toggle System</h2>
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
    <br>
    <button onclick="toggleHighlight()">Highlight</button>
    <button onclick="hideBoxes()">Hide</button>
    <button onclick="showBoxes()">Show</button>
    <button onclick="resetBoxes()">Reset</button>
  </section>

  <!-- Challenge 2: Theme Switcher -->
  <section>
    <h2>Theme Switcher</h2>
    <button id="darkModeBtn">Toggle Dark Mode</button>
  </section>

  <!-- Challenge 3: Interactive Cards -->
  <section>
    <h2>Interactive Cards</h2>
    <div class="card-panel" id="card1">
      <strong>Card 1</strong>
      <p>More detail here, visible when expanded.</p>
      <button onclick="toggleCard('card1', this)">Expand</button>
    </div>
    <div class="card-panel" id="card2">
      <strong>Card 2</strong>
      <p>More detail here, visible when expanded.</p>
      <button onclick="toggleCard('card2', this)">Expand</button>
    </div>
    <div class="card-panel" id="card3">
      <strong>Card 3</strong>
      <p>More detail here, visible when expanded.</p>
      <button onclick="toggleCard('card3', this)">Expand</button>
    </div>
  </section>

  <!-- Challenge 4: Status Indicator -->
  <section>
    <h2>Status Indicator</h2>
    <select id="statusSelect">
      <option value="">-- Choose --</option>
      <option value="success">Success</option>
      <option value="warning">Warning</option>
      <option value="error">Error</option>
      <option value="info">Info</option>
    </select>
    <div id="statusBox" class="status-box" style="display:none;"></div>
  </section>

  <script>
    // Challenge 1
    const boxes = [document.getElementById("box1"),
                   document.getElementById("box2"),
                   document.getElementById("box3")];

    function toggleHighlight() {
      boxes.forEach(b => b.classList.toggle("highlighted"));
    }
    function hideBoxes() {
      boxes.forEach(b => b.classList.add("hidden"));
    }
    function showBoxes() {
      boxes.forEach(b => b.classList.remove("hidden"));
    }
    function resetBoxes() {
      boxes.forEach(b => { b.className = "box"; });
    }

    // Challenge 2
    document.getElementById("darkModeBtn").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
    });

    // Challenge 3
    function toggleCard(id, btn) {
      const card = document.getElementById(id);
      card.classList.toggle("expanded");
      btn.textContent = card.classList.contains("expanded") ? "Collapse" : "Expand";
    }

    // Challenge 4
    const statusMessages = {
      success: "Operation completed successfully.",
      warning: "Please review your input.",
      error:   "Something went wrong. Try again.",
      info:    "Here is some helpful information."
    };
    document.getElementById("statusSelect").addEventListener("change", function () {
      const box = document.getElementById("statusBox");
      const val = this.value;
      if (!val) { box.style.display = "none"; return; }
      box.className = `status-box ${val}`;
      box.textContent = statusMessages[val];
      box.style.display = "block";
    });
  </script>
</body>
</html>
