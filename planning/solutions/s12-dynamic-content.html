<!DOCTYPE html>
<!-- Session 12: Dynamic Content Builder — Example Solution -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session 12 Solution</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 8px 0; border-radius: 4px; }
    button { margin: 4px; padding: 4px 8px; cursor: pointer; }
    table { border-collapse: collapse; margin-top: 10px; }
    td, th { border: 1px solid #ccc; padding: 6px 12px; }
    section { margin-bottom: 24px; }
  </style>
</head>
<body>

  <!-- Challenge 1: Card Builder -->
  <section>
    <h2>Card Builder</h2>
    <button id="addCardBtn">Add Card</button>
    <div id="cardContainer"></div>
  </section>

  <!-- Challenge 2: Todo List -->
  <section>
    <h2>Todo List</h2>
    <input id="todoInput" type="text" placeholder="Enter a task">
    <button id="addTodoBtn">Add</button>
    <ul id="todoList"></ul>
  </section>

  <!-- Challenge 3: Dynamic Table -->
  <section>
    <h2>Products</h2>
    <div id="productTable"></div>
  </section>

  <!-- Challenge 4: Comment System -->
  <section>
    <h2>Comments</h2>
    <input id="commentInput" type="text" placeholder="Write a comment">
    <button id="addCommentBtn">Add Comment</button>
    <div id="commentList"></div>
  </section>

  <script>
    // Challenge 1: Card Builder
    let cardCount = 0;
    document.getElementById("addCardBtn").addEventListener("click", () => {
      cardCount++;
      const card = document.createElement("div");
      card.className = "card";

      const h3 = document.createElement("h3");
      h3.textContent = `Card ${cardCount}`;

      const p = document.createElement("p");
      p.textContent = `This is card number ${cardCount}.`;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Delete";
      deleteBtn.addEventListener("click", () => card.remove());

      card.appendChild(h3);
      card.appendChild(p);
      card.appendChild(deleteBtn);
      document.getElementById("cardContainer").appendChild(card);
    });

    // Challenge 2: Todo List
    document.getElementById("addTodoBtn").addEventListener("click", () => {
      const input = document.getElementById("todoInput");
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement("li");
      li.textContent = text + " ";

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.addEventListener("click", () => li.remove());

      li.appendChild(del);
      document.getElementById("todoList").appendChild(li);
      input.value = "";
    });

    // Challenge 3: Dynamic Table from array
    const products = [
      { name: "Laptop", price: 999, stock: 5 },
      { name: "Mouse", price: 29, stock: 20 },
      { name: "Keyboard", price: 79, stock: 15 },
      { name: "Monitor", price: 299, stock: 8 },
      { name: "Webcam", price: 59, stock: 12 }
    ];
    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");
    ["Name", "Price", "Stock"].forEach(text => {
      const th = document.createElement("th");
      th.textContent = text;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    products.forEach(p => {
      const row = document.createElement("tr");
      [p.name, `$${p.price}`, p.stock].forEach(val => {
        const td = document.createElement("td");
        td.textContent = val;
        row.appendChild(td);
      });
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    document.getElementById("productTable").appendChild(table);

    // Challenge 4: Comment System
    document.getElementById("addCommentBtn").addEventListener("click", () => {
      const input = document.getElementById("commentInput");
      const text = input.value.trim();
      if (!text) return;

      const commentDiv = document.createElement("div");
      commentDiv.className = "card";

      const textNode = document.createElement("p");
      textNode.textContent = text;

      const ts = document.createElement("small");
      ts.textContent = new Date().toLocaleTimeString();

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.addEventListener("click", () => commentDiv.remove());

      commentDiv.appendChild(textNode);
      commentDiv.appendChild(ts);
      commentDiv.appendChild(del);
      document.getElementById("commentList").appendChild(commentDiv);
      input.value = "";
    });
  </script>
</body>
</html>
