<!DOCTYPE html>
<!-- Session 11: DOM Selection and Modification — Example Solution -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session 11 Solution</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .info { color: #444; }
    #profile { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    table { border-collapse: collapse; margin-top: 10px; }
    td, th { border: 1px solid #ccc; padding: 6px 12px; }
  </style>
</head>
<body>

  <!-- Challenge 1 -->
  <h1 id="mainTitle">Original Title</h1>
  <p class="info">First paragraph</p>
  <p class="info">Second paragraph</p>
  <p class="info">Third paragraph</p>
  <button id="updateBtn">Update</button>

  <!-- Challenge 2 -->
  <ul id="skills"></ul>

  <!-- Challenge 3 -->
  <div id="profile">
    <h2 id="userName"></h2>
    <p id="userEmail"></p>
    <p id="userStatus"></p>
  </div>

  <!-- Challenge 4 -->
  <div id="gallery">
    <img id="img1" src="" alt="">
    <img id="img2" src="" alt="">
    <img id="img3" src="" alt="">
  </div>

  <!-- Challenge 5 -->
  <table id="scoreTable"></table>

  <script>
    // Challenge 1: Select and modify
    document.querySelector("h1").textContent = "DOM Master";
    const infoParagraphs = document.querySelectorAll(".info");
    infoParagraphs.forEach((p, i) => {
      p.textContent = `${i + 1}. ${p.textContent}`;
    });

    // Challenge 2: Dynamic list
    const skills = ["JavaScript", "HTML", "CSS", "DOM"];
    const ul = document.getElementById("skills");
    skills.forEach(skill => {
      const li = document.createElement("li");
      li.textContent = skill;
      ul.appendChild(li);
    });

    // Challenge 3: User profile from object
    const userProfile = { name: "Alex", email: "alex@example.com", online: true };
    document.getElementById("userName").textContent = userProfile.name;
    document.getElementById("userEmail").textContent = userProfile.email;
    document.getElementById("userStatus").textContent = userProfile.online ? "Online" : "Offline";

    // Challenge 4: Image gallery
    const images = [
      { src: "https://via.placeholder.com/100", alt: "Image 1" },
      { src: "https://via.placeholder.com/100", alt: "Image 2" },
      { src: "https://via.placeholder.com/100", alt: "Image 3" }
    ];
    images.forEach((img, i) => {
      const el = document.getElementById(`img${i + 1}`);
      el.src = img.src;
      el.alt = img.alt;
    });

    // Challenge 5: Dynamic table (Level 2)
    const students = [
      { name: "Alex", score: 92 },
      { name: "Jordan", score: 78 },
      { name: "Casey", score: 85 },
      { name: "Riley", score: 60 },
      { name: "Morgan", score: 95 }
    ];
    const table = document.getElementById("scoreTable");
    const headerRow = table.insertRow();
    ["Name", "Score"].forEach(text => {
      const th = document.createElement("th");
      th.textContent = text;
      headerRow.appendChild(th);
    });
    students.forEach(s => {
      const row = table.insertRow();
      row.insertCell().textContent = s.name;
      row.insertCell().textContent = s.score;
    });

    // Challenge 7: Mini Dashboard (Level 3)
    const dashboard = document.createElement("div");
    dashboard.innerHTML = `<h2>Welcome, ${userProfile.name}!</h2>`;
    const statsData = [
      { label: "Sessions Completed", value: 11 },
      { label: "Assignments Done", value: 10 },
      { label: "Current Score", value: "A" }
    ];
    statsData.forEach(stat => {
      const card = document.createElement("div");
      card.style.cssText = "border:1px solid #999;padding:8px;display:inline-block;margin:4px;";
      card.innerHTML = `<strong>${stat.value}</strong><br>${stat.label}`;
      dashboard.appendChild(card);
    });
    const activities = ["Completed S1", "Completed S2", "Completed S11 reading"];
    const actList = document.createElement("ul");
    activities.forEach(a => {
      const li = document.createElement("li");
      li.textContent = a;
      actList.appendChild(li);
    });
    dashboard.appendChild(actList);
    document.body.appendChild(dashboard);
  </script>
</body>
</html>
