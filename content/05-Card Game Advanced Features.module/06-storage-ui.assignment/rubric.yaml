title: "Session 22 Assignment Rubric: Persistence and UI Polish"
criteria:
  - description: "Game State Persistence"
    longdescription: "Implements save/load functionality using localStorage. Saves complete game state (hands, scores, round). Loads saved game on startup. Handles missing/invalid data gracefully. Auto-saves after rounds."
    points: 15
    ratings:
      - description: "Excellent"
        longdescription: "Perfect save/load implementation. All game state saved and restored correctly. Auto-save and manual save both work. Handles edge cases (missing data, corrupted data). Clear user feedback. No errors."
        points: 15
      - description: "Good"
        longdescription: "Save/load works with minor issues. Most game state preserved. Either auto-save or manual save works. Basic error handling. Some user feedback. Few minor errors."
        points: 12
      - description: "Satisfactory"
        longdescription: "Basic save/load functional. Some game state saved but incomplete. Manual save works but auto-save may not. Minimal error handling. Limited feedback."
        points: 9
      - description: "Needs Improvement"
        longdescription: "Save/load partially works. Significant data loss or corruption. Inconsistent functionality. Poor error handling. Game may crash on reload."
        points: 5
      - description: "Insufficient"
        longdescription: "Save/load not working or not implemented. Game state not preserved. No error handling. Cannot test functionality."
        points: 0

  - description: "High Scores System"
    longdescription: "Implements persistent high scores with top 10 tracking. Properly sorts scores highest to lowest. Prompts for name on high score. Displays formatted list with rank, name, score, and date. Persists across sessions."
    points: 15
    ratings:
      - description: "Excellent"
        longdescription: "Complete high scores system. Top 10 correctly maintained and sorted. Name prompt appears appropriately. Beautiful formatted display with all required info. Perfect persistence. Handles empty list gracefully."
        points: 15
      - description: "Good"
        longdescription: "High scores work well with 1-2 minor issues. Sorting correct. Name prompt works. Display shows most required info. Persists correctly. Minor formatting issues."
        points: 12
      - description: "Satisfactory"
        longdescription: "Basic high scores functional. May store more/less than 10. Sorting works but may have edge cases. Display basic but readable. Persistence works."
        points: 9
      - description: "Needs Improvement"
        longdescription: "High scores partially implemented. Sorting incorrect or broken. Name prompt missing or buggy. Display incomplete. Persistence unreliable."
        points: 5
      - description: "Insufficient"
        longdescription: "High scores not working or not implemented. Cannot track or display scores. No persistence."
        points: 0

  - description: "Settings Panel and Functionality"
    longdescription: "Creates persistent settings with at least 3 options (sound, difficulty, theme). Settings panel UI is accessible and usable. Settings save immediately on change. Settings load and apply on page load. Includes reset to defaults."
    points: 15
    ratings:
      - description: "Excellent"
        longdescription: "Professional settings panel with 3+ options. Clean, intuitive UI. Settings save instantly on change. All settings apply correctly on load. Reset to defaults works perfectly. Excellent UX."
        points: 15
      - description: "Good"
        longdescription: "Good settings panel with 3 options. Functional UI with minor layout issues. Settings save and load correctly. Reset works. Minor UX issues."
        points: 12
      - description: "Satisfactory"
        longdescription: "Basic settings panel with 2-3 options. UI functional but basic. Settings mostly save/load. Reset may be missing. Basic but workable."
        points: 9
      - description: "Needs Improvement"
        longdescription: "Incomplete settings panel. Only 1-2 options. UI hard to use. Settings may not save/load reliably. Reset missing or broken."
        points: 5
      - description: "Insufficient"
        longdescription: "Settings panel not working or not implemented. Cannot change or persist settings."
        points: 0

  - description: "Theme Switching"
    longdescription: "Implements light and dark themes using CSS variables. Theme persists across sessions. Smooth transitions between themes. At least 4 visual elements change (background, text, cards, buttons)."
    points: 5
    ratings:
      - description: "Excellent"
        longdescription: "Beautiful theme implementation with smooth transitions. Both themes look professional. 4+ elements styled distinctly. Theme persists perfectly. Excellent visual polish."
        points: 5
      - description: "Good"
        longdescription: "Good theme implementation. Both themes functional with minor inconsistencies. 4 elements change. Transitions work. Persistence correct."
        points: 4
      - description: "Satisfactory"
        longdescription: "Basic theme switching works. Both themes present but may lack polish. 3-4 elements change. May lack transitions. Persistence works."
        points: 3
      - description: "Needs Improvement"
        longdescription: "Theme switching partially works. Only 2-3 elements change. Inconsistent application. Persistence unreliable."
        points: 1
      - description: "Insufficient"
        longdescription: "Theme switching not working or not implemented."
        points: 0

  - description: "Stretch Goal: Leaderboard System (Optional Bonus)"
    longdescription: "OPTIONAL: Comprehensive statistics tracking including total games, win/loss record, win rate, streaks. Advanced features like sort/filter. Visual statistics dashboard. Goes significantly beyond basic high scores."
    points: 10
    ratings:
      - description: "Exceptional"
        longdescription: "Professional leaderboard with comprehensive stats. Multiple sort/filter options work perfectly. Beautiful visual dashboard. All statistics accurate and meaningful. Truly impressive extra work."
        points: 10
      - description: "Strong"
        longdescription: "Good leaderboard with most stats implemented. Sort or filter works. Good visual presentation. Statistics mostly accurate. Solid extra effort."
        points: 7
      - description: "Adequate"
        longdescription: "Basic leaderboard beyond high scores. Some statistics tracked. Basic sort/filter. Simple visual display. Shows effort."
        points: 4
      - description: "Minimal"
        longdescription: "Attempted leaderboard but incomplete or buggy. Very limited stats. Minimal extra functionality."
        points: 2
      - description: "Not Attempted"
        longdescription: "Stretch goal not attempted or only high scores (no bonus)."
        points: 0