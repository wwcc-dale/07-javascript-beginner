title: "Session 24 Assignment Rubric: Code Modularization"
criteria:
  - description: "Project Structure and Organization"
    longdescription: "Proper folder structure with src/, classes/, utils/, ui/ folders. Files correctly placed in appropriate folders. index.html updated with module script tag."
    points: 10
    ratings:
      - description: "Excellent"
        longdescription: "Perfect folder structure exactly matching requirements. All files in correct locations. HTML properly uses <script type='module'>. Logical organization demonstrates clear understanding."
        points: 10
      - description: "Good"
        longdescription: "Folder structure mostly correct with 1-2 minor naming issues. Files in correct general locations. HTML uses module script tag correctly."
        points: 8
      - description: "Satisfactory"
        longdescription: "Basic folder structure present but some organization issues. Some files misplaced. HTML may have minor issues but uses modules."
        points: 6
      - description: "Needs Improvement"
        longdescription: "Folder structure incomplete or significantly incorrect. Many files in wrong locations. HTML not properly configured for modules."
        points: 3
      - description: "Insufficient"
        longdescription: "No proper folder structure. Files not organized. HTML does not use module system."
        points: 0

  - description: "Module Exports"
    longdescription: "All classes, functions, and constants properly exported using export or export default syntax. Exports are appropriate for the module's purpose."
    points: 10
    ratings:
      - description: "Excellent"
        longdescription: "All modules properly export their contents. Consistent use of named/default exports. Export syntax correct throughout. No missing exports."
        points: 10
      - description: "Good"
        longdescription: "Most exports correct with 1-2 minor issues. Generally consistent pattern. One or two missing exports that don't break functionality."
        points: 8
      - description: "Satisfactory"
        longdescription: "Exports present but inconsistent or incorrect in several places. Some missing exports. Mixing of export patterns without clear reason."
        points: 6
      - description: "Needs Improvement"
        longdescription: "Many exports missing or incorrect. Significant syntax errors. Doesn't demonstrate understanding of export patterns."
        points: 3
      - description: "Insufficient"
        longdescription: "No exports or fundamentally incorrect export usage. Code cannot function as modules."
        points: 0

  - description: "Module Imports"
    longdescription: "All dependencies correctly imported using import syntax. Import paths use correct relative paths (./ or ../). All imports include .js extension. No circular dependencies."
    points: 10
    ratings:
      - description: "Excellent"
        longdescription: "All imports correct with proper relative paths. All paths include .js extension. No circular dependencies. Imports organized logically at top of files."
        points: 10
      - description: "Good"
        longdescription: "Most imports correct with 1-2 path issues that were resolved. All extensions present. No circular dependencies. Minor organizational issues."
        points: 8
      - description: "Satisfactory"
        longdescription: "Imports mostly work but several path issues. Some missing extensions. Possible circular dependency that was avoided. Less organized."
        points: 6
      - description: "Needs Improvement"
        longdescription: "Many incorrect import paths. Missing .js extensions. Circular dependencies present. Imports scattered throughout files."
        points: 3
      - description: "Insufficient"
        longdescription: "Imports fundamentally incorrect or missing. Code cannot load modules properly. Demonstrates lack of understanding."
        points: 0

  - description: "Functionality Preserved"
    longdescription: "All features from original Sessions 16-23 game work correctly after modularization. Deck operations, player management, UI updates, and game logic all functional. No regression in features."
    points: 15
    ratings:
      - description: "Excellent"
        longdescription: "All original features work perfectly. No functionality lost. Game operates exactly as before modularization. All UI interactions functional. No console errors."
        points: 15
      - description: "Good"
        longdescription: "Nearly all features work with 1-2 minor issues that don't break core gameplay. Main functionality intact. Few console warnings but no critical errors."
        points: 12
      - description: "Satisfactory"
        longdescription: "Core features work but some functionality broken. Main game playable but missing some features. Some console errors present. Partial functionality loss."
        points: 9
      - description: "Needs Improvement"
        longdescription: "Significant functionality broken. Game partially playable but major features missing or broken. Many console errors. Substantial regression."
        points: 5
      - description: "Insufficient"
        longdescription: "Game does not work. Critical errors prevent functionality. Cannot create deck, deal cards, or play game. Complete failure."
        points: 0

  - description: "Code Quality and Best Practices"
    longdescription: "One class per file. Descriptive file names matching contents. Consistent formatting and indentation. No console errors. Brief comments explaining module purpose."
    points: 5
    ratings:
      - description: "Excellent"
        longdescription: "Perfect adherence to best practices. One class per file. File names match contents exactly. Clean, consistent formatting. No errors. Comments explain each module's purpose clearly."
        points: 5
      - description: "Good"
        longdescription: "Follows most best practices with 1-2 minor deviations. Generally one class per file. Good naming. Mostly consistent formatting. Comments present."
        points: 4
      - description: "Satisfactory"
        longdescription: "Some best practices followed but inconsistent. Occasional multiple classes per file. Naming adequate but not perfect. Formatting somewhat inconsistent."
        points: 3
      - description: "Needs Improvement"
        longdescription: "Poor adherence to best practices. Multiple classes per file frequently. Poor naming. Inconsistent formatting. Few or no comments."
        points: 1
      - description: "Insufficient"
        longdescription: "No evidence of following best practices. Chaotic organization. No meaningful naming. No comments. Poor code quality overall."
        points: 0