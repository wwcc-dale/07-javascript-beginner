title: "Coding Assignment Rubric"

criteria:
  - description: "Code Correctness - Level 1 Required Challenges"
    long_description: "All four Level 1 challenges are complete and produce correct output"
    points: 50
    ratings:
      - description: "Excellent"
        long_description: "All 4 challenges completed correctly with expected output"
        points: 50
      - description: "Proficient"
        long_description: "3 challenges completed correctly"
        points: 40
      - description: "Developing"
        long_description: "2 challenges completed correctly"
        points: 30
      - description: "Beginning"
        long_description: "1 challenge completed correctly"
        points: 20
      - description: "Not Demonstrated"
        long_description: "No challenges completed correctly or not submitted"
        points: 0

  - description: "Code Quality and Readability"
    long_description: "Code uses appropriate variable types (const vs let), meaningful variable names, and proper syntax"
    points: 20
    ratings:
      - description: "Excellent"
        long_description: "Proper use of const/let throughout; clear, meaningful variable names; clean formatting"
        points: 20
      - description: "Proficient"
        long_description: "Mostly correct const/let usage; variable names are understandable; minor formatting issues"
        points: 16
      - description: "Developing"
        long_description: "Some confusion between const/let; variable names could be clearer; inconsistent formatting"
        points: 12
      - description: "Beginning"
        long_description: "Frequent const/let errors; unclear variable names; poor formatting"
        points: 8
      - description: "Not Demonstrated"
        long_description: "Code is unreadable or does not follow basic conventions"
        points: 0

  - description: "Stretch Challenges (Bonus)"
    long_description: "Level 2 and Level 3 optional challenges attempted and working"
    points: 30
    ratings:
      - description: "All Bonus Complete"
        long_description: "All Level 2 and Level 3 challenges completed correctly"
        points: 30
      - description: "Most Bonus Complete"
        long_description: "Level 2 completed or most of Level 2 + attempted Level 3"
        points: 20
      - description: "Some Bonus Attempted"
        long_description: "At least one stretch challenge attempted with partial success"
        points: 10
      - description: "Not Attempted"
        long_description: "No stretch challenges attempted"
        points: 0
